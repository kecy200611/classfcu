<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>真實車體彈塑性碰撞模擬器</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #1a1a1a;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }
        #ui-layer {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 10;
            background: rgba(30, 30, 30, 0.85);
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
            width: 320px;
            pointer-events: auto;
            border: 1px solid #444;
        }
        .control-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-size: 14px;
            color: #ccc;
        }
        input[type="range"] {
            width: 100%;
            margin-bottom: 5px;
        }
        select {
            width: 100%;
            padding: 8px;
            background: #2b2b2b;
            color: #fff;
            border: 1px solid #555;
            border-radius: 4px;
            margin-bottom: 5px;
        }
        .value-display {
            float: right;
            font-weight: bold;
            color: #00ffcc;
        }
        button {
            width: 100%;
            padding: 10px;
            background-color: #d9534f;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            transition: background 0.2s;
        }
        button:hover {
            background-color: #c9302c;
        }
        #blueprint-panel {
            position: absolute;
            bottom: 20px;
            right: 20px;
            z-index: 10;
            background: rgba(30, 30, 30, 0.85);
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #444;
            max-width: 400px;
        }
        #blueprint-panel img {
            width: 100%;
            height: auto;
            display: block;
            border-radius: 4px;
            filter: brightness(0.8) contrast(1.2);
        }
        .panel-title {
            font-size: 14px;
            font-weight: bold;
            margin-bottom: 8px;
            color: #00ffcc;
            border-bottom: 1px solid #444;
            padding-bottom: 4px;
        }
        #stats {
            margin-top: 15px;
            font-family: monospace;
            font-size: 12px;
            color: #aaa;
            background: rgba(0,0,0,0.3);
            padding: 8px;
            border-radius: 4px;
        }
        .formula-box {
            border-top: 1px dashed #555;
            margin-top: 10px;
            padding-top: 10px;
            color: #e0e0e0;
        }
        .formula-item {
            margin-bottom: 6px;
        }
        .formula-title {
            color: #ffaa00;
            font-weight: bold;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
</head>
<body>

    <div id="canvas-container"></div>

    <div id="ui-layer">
        <div class="panel-title">真實物理碰撞測試</div>
        
        <div class="control-group">
            <label>選擇實驗車型預設</label>
            <select id="preset-select">
                <option value="12140">華德 rac700 elcb2900 (12.14 噸)</option>
                <option value="13460">創奕 Trn m3ev 12lf j (13.46 噸)</option>
                <option value="13800" selected>鴻華 Model t 整車重 (13.80 噸)</option>
                <option value="15350">華德 rac700 最大重 (15.35 噸)</option>
                <option value="16300">創奕 Trn 最大重 (16.30 噸)</option>
                <option value="17890">鴻華 Model t 最大重 (17.89 噸)</option>
            </select>
        </div>

        <div class="control-group">
            <label>自訂車輛總重: <span id="mass-val" class="value-display">13800</span> kg</label>
            <input type="range" id="mass-slider" min="12140" max="17890" step="10" value="13800">
        </div>

        <div class="control-group">
            <label>初速度 (Speed): <span id="speed-val" class="value-display">20</span> km/h</label>
            <input type="range" id="speed-slider" min="10" max="100" step="5" value="20">
        </div>

        <div class="control-group">
            <label>鋼材屈服強度 (Yield): <span id="yield-val" class="value-display">400</span> MPa</label>
            <input type="range" id="yield-slider" min="250" max="700" step="10" value="400">
        </div>

        <button id="start-btn">執行實車撞擊測試</button>

        <div id="stats">
            <div>最大潰縮量: <span id="deform-display">0.00</span> m</div>
            <div>狀態: <span id="status-display" style="color:#00ffcc;">準備就緒</span></div>
            
            <div class="formula-box">
                <div class="formula-title">物理公式即時計算：</div>
                <div class="formula-item">動量 P = m · v<br>＝ <span id="momentum-calc">0</span> kg·m/s</div>
                <div class="formula-item">動能 Ek = 1/2 · m · v²<br>＝ <span id="ke-calc">0</span> J (約 <span id="ke-kj">0</span> kJ)</div>
            </div>
        </div>
    </div>

    <div id="blueprint-panel">
        <div class="panel-title">Model T 參考圖 (側視圖)</div>
        <img src="Foxconn_Model_T_Bus_2022_1000_0005.jpg" alt="Foxconn Model T Side View">
    </div>

    <script>
        let scene, camera, renderer, controls;
        let busBody, wheels = [];
        let physicsNodes = [], structuralLinks = [];
        let wall;
        let busMesh;
        
        let isSimulating = false;
        let isForcedSettled = false;
        let initialSpeed = 20; 
        let currentVelocity = 0;
        let busMass = 13800;
        let yieldStrengthMPa = 400; 
        
        let stableTimer = 0;
        let lastDeformValue = 0;
        let finalLockedDeform = 0;
        
        const originalNodePositions = [];
        const busLength = 12;
        const busWidth = 2.5;
        const busHeight = 3.2;
        const wallX = -8; 
        const startX = 5;

        function init() {
            const container = document.getElementById('canvas-container');
            
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x111111);
            scene.fog = new THREE.FogExp2(0x111111, 0.015);

            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(-2, 4, 14);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;
            container.appendChild(renderer.domElement);

            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.05;
            controls.maxPolarAngle = Math.PI / 2 - 0.05; 

            const ambientLight = new THREE.AmbientLight(0x555555);
            scene.add(ambientLight);

            const dirLight = new THREE.DirectionalLight(0xffffff, 1.0);
            dirLight.position.set(20, 40, 20);
            dirLight.castShadow = true;
            dirLight.shadow.mapSize.width = 2048;
            dirLight.shadow.mapSize.height = 2048;
            scene.add(dirLight);

            const grid = new THREE.GridHelper(200, 100, 0x333333, 0x222222);
            grid.position.y = -0.01;
            scene.add(grid);

            const floorGeo = new THREE.PlaneGeometry(200, 200);
            const floorMat = new THREE.MeshStandardMaterial({ color: 0x1a1a1a, roughness: 0.8 });
            const floor = new THREE.Mesh(floorGeo, floorMat);
            floor.rotation.x = -Math.PI / 2;
            floor.receiveShadow = true;
            scene.add(floor);

            createWall();
            createDeformableBus();

            setupUI();

            window.addEventListener('resize', onWindowResize);
            animate();
        }

        function createWall() {
            const wallGeo = new THREE.BoxGeometry(2, 8, 10);
            const wallMat = new THREE.MeshStandardMaterial({ color: 0x333333, roughness: 0.6 });
            wall = new THREE.Mesh(wallGeo, wallMat);
            wall.position.set(wallX - 1, 4, 0);
            wall.castShadow = true;
            wall.receiveShadow = true;
            scene.add(wall);

            const stripeGeo = new THREE.BoxGeometry(0.1, 8, 10);
            const stripeMat = new THREE.MeshBasicMaterial({ color: 0xd9534f });
            const stripe = new THREE.Mesh(stripeGeo, stripeMat);
            stripe.position.set(wallX, 4, 0);
            scene.add(stripe);
        }

        function createDeformableBus() {
            if (busBody) scene.remove(busBody);
            wheels.forEach(w => scene.remove(w));
            wheels = [];
            physicsNodes = [];
            structuralLinks = [];
            originalNodePositions.length = 0;

            busBody = new THREE.Group();
            busBody.position.set(startX, busHeight / 2 + 0.4, 0);
            scene.add(busBody);

            const segsX = 14; 
            const segsY = 3;
            const segsZ = 4;

            const hLen = busLength / 2;
            const hW = busWidth / 2;
            const hH = busHeight / 2;

            const nodeIndicesMap = {};

            for (let i = 0; i <= segsX; i++) {
                let pct = i / segsX; 
                let x = hLen - pct * busLength;

                for (let j = 0; j <= segsY; j++) {
                    let y = -hH + (j / segsY) * busHeight;
                    for (let k = 0; k <= segsZ; k++) {
                        let z = -hW + (k / segsZ) * busWidth;

                        let isOuterSkin = (i === 0 || i === segsX || j === 0 || j === segsY || k === 0 || k === segsZ);

                        if (isOuterSkin) {
                            let key = `${i}_${j}_${k}`;
                            nodeIndicesMap[key] = physicsNodes.length;
                            physicsNodes.push({
                                pos: new THREE.Vector3(x, y, z),
                                origPos: new THREE.Vector3(x, y, z),
                                v: new THREE.Vector3(0, 0, 0),
                                f: new THREE.Vector3(0, 0, 0),
                                plasticDeformBase: 0, 
                                edgeX: i,
                                edgeY: j,
                                edgeZ: k
                            });
                        }
                    }
                }
            }

            const geometry = new THREE.BufferGeometry();
            const positions = [];
            const indices = [];

            physicsNodes.forEach((n, idx) => {
                positions.push(n.pos.x, n.pos.y, n.pos.z);
                originalNodePositions.push(n.pos.clone());
            });

            function getIdx(i, j, k) {
                return nodeIndicesMap[`${i}_${j}_${k}`];
            }

            for (let i = 0; i < segsX; i++) {
                if (i === 0) {
                    for (let j = 0; j < segsY; j++) {
                        for (let k = 0; k < segsZ; k++) {
                            let idx1 = getIdx(0, j, k);
                            let idx2 = getIdx(0, j + 1, k);
                            let idx3 = getIdx(0, j, k + 1);
                            let idx4 = getIdx(0, j + 1, k + 1);
                            if(idx1!==undefined && idx2!==undefined && idx3!==undefined) indices.push(idx1, idx2, idx3);
                            if(idx2!==undefined && idx4!==undefined && idx3!==undefined) indices.push(idx2, idx4, idx3);
                        }
                    }
                }

                if (i === segsX - 1) {
                    for (let j = 0; j < segsY; j++) {
                        for (let k = 0; k < segsZ; k++) {
                            let idx1 = getIdx(segsX, j, k);
                            let idx2 = getIdx(segsX, j + 1, k);
                            let idx3 = getIdx(segsX, j, k + 1);
                            let idx4 = getIdx(segsX, j + 1, k + 1);
                            if(idx1!==undefined && idx3!==undefined && idx2!==undefined) indices.push(idx1, idx3, idx2);
                            if(idx2!==undefined && idx3!==undefined && idx4!==undefined) indices.push(idx2, idx3, idx4);
                        }
                    }
                }

                for (let j = 0; j <= segsY; j++) {
                    for (let k = 0; k <= segsZ; k++) {
                        if (j === 0 || j === segsY || k === 0 || k === segsZ) {
                            let idx1 = getIdx(i, j, k);
                            let idx2 = getIdx(i + 1, j, k);

                            if (j < segsY) {
                                let idx3 = getIdx(i, j + 1, k);
                                let idx4 = getIdx(i + 1, j + 1, k);
                                if(idx1!==undefined && idx3!==undefined && idx2!==undefined) indices.push(idx1, idx3, idx2);
                                if(idx3!==undefined && idx4!==undefined && idx2!==undefined) indices.push(idx3, idx4, idx2);
                            }

                            if (k < segsZ) {
                                let idx5 = getIdx(i, j, k + 1);
                                let idx6 = getIdx(i + 1, j, k + 1);
                                if(idx1!==undefined && idx2!==undefined && idx5!==undefined) indices.push(idx1, idx2, idx5);
                                if(idx5!==undefined && idx2!==undefined && idx6!==undefined) indices.push(idx5, idx2, idx6);
                            }
                        }
                    }
                }
            }

            geometry.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
            geometry.setIndex(indices);

            const skinMat = new THREE.MeshStandardMaterial({
                color: 0xdddddd,
                roughness: 0.2,
                metalness: 0.5,
                side: THREE.DoubleSide
            });

            busMesh = new THREE.Mesh(geometry, skinMat);
            busMesh.castShadow = true;
            busMesh.receiveShadow = true;
            busBody.add(busMesh);

            buildConstitutiveLinks();
            attachSolidVisualElements();
        }

        function buildConstitutiveLinks() {
            const maxDist = 2.0; 
            for (let i = 0; i < physicsNodes.length; i++) {
                for (let j = i + 1; j < physicsNodes.length; j++) {
                    let d = physicsNodes[i].pos.distanceTo(physicsNodes[j].pos);
                    if (d < maxDist) {
                        structuralLinks.push({
                            n1: physicsNodes[i],
                            n2: physicsNodes[j],
                            L0: d,           
                            plasticDeform: 0 
                        });
                    }
                }
            }
        }

        function attachSolidVisualElements() {
            const wheelGeo = new THREE.CylinderGeometry(0.45, 0.45, 0.4, 24);
            wheelGeo.rotateX(Math.PI / 2);
            const wheelMat = new THREE.MeshStandardMaterial({ color: 0x151515, roughness: 0.8 });

            const wheelPositions = [
                new THREE.Vector3(3.5, -busHeight/2, 1.25),  
                new THREE.Vector3(3.5, -busHeight/2, -1.25), 
                new THREE.Vector3(-3.5, -busHeight/2, 1.25), 
                new THREE.Vector3(-3.5, -busHeight/2, -1.25)
            ];

            wheelPositions.forEach(pos => {
                const wMesh = new THREE.Mesh(wheelGeo, wheelMat);
                wMesh.position.copy(pos);
                wMesh.castShadow = true;
                busBody.add(wMesh);
                wheels.push({
                    mesh: wMesh,
                    relX: pos.x
                });
            });
        }

        function setupUI() {
            const presetSelect = document.getElementById('preset-select');
            const massSlider = document.getElementById('mass-slider');
            const massVal = document.getElementById('mass-val');

            presetSelect.addEventListener('change', (e) => {
                let val = parseInt(e.target.value);
                massSlider.value = val;
                busMass = val;
                massVal.innerText = val;
                calculatePhysicsFormulas();
            });

            massSlider.addEventListener('input', (e) => {
                busMass = parseInt(e.target.value);
                massVal.innerText = busMass;
                presetSelect.value = "custom"; 
                calculatePhysicsFormulas();
            });

            const speedSlider = document.getElementById('speed-slider');
            const speedVal = document.getElementById('speed-val');
            speedSlider.addEventListener('input', (e) => {
                initialSpeed = parseInt(e.target.value);
                speedVal.innerText = initialSpeed;
                calculatePhysicsFormulas();
            });

            const yieldSlider = document.getElementById('yield-slider');
            const yieldVal = document.getElementById('yield-val');
            yieldSlider.addEventListener('input', (e) => {
                yieldStrengthMPa = parseInt(e.target.value);
                yieldVal.innerText = yieldStrengthMPa;
            });

            document.getElementById('start-btn').addEventListener('click', () => {
                resetSimulation();
                isSimulating = true;
                isForcedSettled = false;
                stableTimer = 0;
                lastDeformValue = 0;
                finalLockedDeform = 0;
                currentVelocity = -(initialSpeed * 1000) / 3600; 
                document.getElementById('status-display').innerText = "高速衝撞中...";
                document.getElementById('status-display').style.color = "#ff3333";
            });

            calculatePhysicsFormulas();
        }

        function calculatePhysicsFormulas() {
            const m = busMass; 
            const v = (initialSpeed * 1000) / 3600; 

            const momentum = m * v;
            const ke = 0.5 * m * v * v;

            document.getElementById('momentum-calc').innerText = Math.round(momentum).toLocaleString();
            document.getElementById('ke-calc').innerText = Math.round(ke).toLocaleString();
            document.getElementById('ke-kj').innerText = Math.round(ke / 1000).toLocaleString();
        }

        function resetSimulation() {
            isSimulating = false;
            isForcedSettled = false;
            stableTimer = 0;
            lastDeformValue = 0;
            finalLockedDeform = 0;
            busBody.position.set(startX, busHeight / 2 + 0.4, 0);
            
            physicsNodes.forEach((n, idx) => {
                n.pos.copy(originalNodePositions[idx]);
                n.v.set(0, 0, 0);
                n.f.set(0, 0, 0);
            });
            
            structuralLinks.forEach(link => {
                link.plasticDeform = 0;
            });

            wheels.forEach(w => {
                w.mesh.position.x = w.relX;
                w.mesh.rotation.set(0,0,0);
            });

            document.getElementById('deform-display').innerText = "0.00";
            document.getElementById('status-display').innerText = "準備就緒";
            document.getElementById('status-display').style.color = "#00ffcc";
            
            updateMeshGeometry();
        }

        function updateMeshGeometry() {
            const busPositions = busMesh.geometry.attributes.position.array;
            
            physicsNodes.forEach((n, idx) => {
                busPositions[idx * 3] = n.pos.x;
                busPositions[idx * 3 + 1] = n.pos.y;
                busPositions[idx * 3 + 2] = n.pos.z;
            });
            
            busMesh.geometry.attributes.position.needsUpdate = true;
            busMesh.geometry.computeVertexNormals();
        }

        function physicsStep(dt) {
            if (!isSimulating || isForcedSettled) return;

            let worldWallX = wallX - busBody.position.x;

            physicsNodes.forEach(n => { n.f.set(0, 0, 0); });

            const Area_cm2 = 12.5; 
            const E_Elastic = 2100000; 
            const MaxYieldForce = yieldStrengthMPa * Area_cm2 * 120; 
            const MaterialDamping = 250; 

            structuralLinks.forEach(link => {
                let dir = new THREE.Vector3().subVectors(link.n2.pos, link.n1.pos);
                let currentLen = dir.length();
                if (currentLen < 0.01) return;
                dir.normalize();

                let effectiveL0 = link.L0 + link.plasticDeform;
                let deltaL = currentLen - effectiveL0;

                let forceMagnitude = deltaL * E_Elastic;

                if (Math.abs(forceMagnitude) > MaxYieldForce) {
                    let excessForce = forceMagnitude - (Math.sign(forceMagnitude) * MaxYieldForce);
                    forceMagnitude = Math.sign(forceMagnitude) * MaxYieldForce + (excessForce * 0.005);
                    link.plasticDeform += (excessForce / E_Elastic) * 0.92;
                }

                let vRel = new THREE.Vector3().subVectors(link.n2.v, link.n1.v);
                forceMagnitude += vRel.dot(dir) * MaterialDamping;

                let totalForceVector = dir.clone().multiplyScalar(forceMagnitude);
                link.n1.f.add(totalForceVector);
                link.n2.f.sub(totalForceVector);
            });

            let nodeMass = busMass / physicsNodes.length;
            let totalDeform = 0;

            physicsNodes.forEach((n, idx) => {
                if (n.v.x === 0 && currentVelocity !== 0) {
                    n.v.x = currentVelocity;
                }

                let acc = n.f.clone().multiplyScalar(1 / nodeMass);
                n.v.add(acc.multiplyScalar(dt));
                
                n.v.y = 0;
                n.v.z = 0;

                n.pos.add(n.v.clone().multiplyScalar(dt));

                let globalX = n.pos.x + busBody.position.x;
                if (globalX <= wallX) {
                    n.pos.x = worldWallX; 
                    n.v.x = 0; 
                    if (n.f.x < 0) n.f.x = 0; 
                }

                let localDeform = originalNodePositions[idx].x - n.pos.x;
                if (localDeform > totalDeform) totalDeform = localDeform;
            });

            let avgVelX = 0;
            physicsNodes.forEach(n => {
                if (n.v.x > 0) n.v.x = 0; 
                avgVelX += n.v.x;
            });
            avgVelX /= physicsNodes.length;

            if (avgVelX > 0) avgVelX = 0;
            busBody.position.x += avgVelX * dt;

            wheels.forEach(w => {
                let connectedNodes = physicsNodes.filter(n => Math.abs(n.origPos.x - w.relX) < 1.5);
                if (connectedNodes.length > 0) {
                    let avgX = 0;
                    connectedNodes.forEach(n => avgX += n.pos.x);
                    w.mesh.position.x = avgX / connectedNodes.length;
                }
                if (Math.abs(avgVelX) > 0.01) {
                    w.mesh.rotation.z += (avgVelX * dt) / 0.5; 
                }
            });

            // 實時鎖定最高潰縮值
            if (totalDeform > finalLockedDeform) {
                finalLockedDeform = totalDeform;
            }
            document.getElementById('deform-display').innerText = Math.max(0, finalLockedDeform).toFixed(2);

            // 當速度幾乎歸零，開啟 5 秒穩定計時器
            if (Math.abs(avgVelX) < 0.005) {
                stableTimer += (dt * 5); // 乘上子步長迴圈係數
                let remainingTime = Math.ceil(5 - stableTimer);
                
                if (remainingTime > 0) {
                    document.getElementById('status-display').innerText = `結構固定中... 剩餘 ${remainingTime} 秒強制定型`;
                    document.getElementById('status-display').style.color = "#00ffcc";
                } else {
                    // 計時滿 5 秒，強制定型並停用物理
                    isSimulating = false;
                    isForcedSettled = true;
                    document.getElementById('status-display').innerText = "強制定型完成（潰縮數據已鎖定）";
                    document.getElementById('status-display').style.color = "#ffaa00";
                    
                    // 完全靜止所有質點速度
                    physicsNodes.forEach(n => { n.v.set(0,0,0); n.f.set(0,0,0); });
                }
            } else {
                stableTimer = 0; // 若尚未完全減速，重設計時器
            }

            updateMeshGeometry();
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);

            if (isSimulating && !isForcedSettled) {
                const dt = 0.0012; 
                for(let i = 0; i < 5; i++) { 
                    physicsStep(dt);
                }
            }

            controls.update();
            renderer.render(scene, camera);
        }

        window.onload = init;
    </script>
</body>
</html>
